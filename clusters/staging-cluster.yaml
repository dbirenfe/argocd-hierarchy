apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-cluster-operators
  namespace: openshift-gitops
  labels:
    cluster: staging-cluster
    tier: cluster
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: clusters
  source:
    repoURL: https://github.com/dbirenfe/argocd-hierarchy.git
    targetRevision: main
    path: operators/staging-cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
