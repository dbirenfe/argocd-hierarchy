apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: local-cluster
  namespace: openshift-gitops
  labels:
    hierarchy/tier: cluster
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cluster-operators
  source:
    repoURL: https://github.com/dbirenfe/argocd-hierarchy.git
    targetRevision: main
    path: operators/overlays/local-cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
