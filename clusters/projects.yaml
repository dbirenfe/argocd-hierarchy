apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: operators
  namespace: openshift-gitops
spec:
  description: Operator-level apps generated by ApplicationSet
  sourceRepos:
    - https://github.com/dbirenfe/argocd-hierarchy.git
  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc
    - namespace: '*'
      server: https://api.staging-cluster.example.com:6443
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
