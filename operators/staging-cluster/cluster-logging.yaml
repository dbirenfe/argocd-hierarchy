apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-cluster-cluster-logging
  namespace: openshift-gitops
  labels:
    cluster: staging-cluster
    tier: operator
    operator: cluster-logging
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: operators
  source:
    repoURL: https://github.com/dbirenfe/argocd-hierarchy.git
    targetRevision: main
    path: resources/cluster-logging
  destination:
    server: https://api.staging-cluster.example.com:6443
    namespace: openshift-logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
