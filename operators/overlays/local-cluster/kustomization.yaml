apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: local-cluster-

components:
  - ../../components/cert-manager
  - ../../components/openshift-gitops
  - ../../components/cluster-logging
  - ../../components/crunchy-postgres
  - ../../components/rhbk-operator
  - ../../components/odf-operator
  - ../../components/rhsso-operator

patches:
  - target:
      kind: Application
    patch: |
      - op: replace
        path: /spec/destination/server
        value: https://kubernetes.default.svc
      - op: add
        path: /metadata/labels/hierarchy~1cluster
        value: local-cluster
