apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: local-cluster-odf-operator
  namespace: openshift-gitops
  labels:
    cluster: local-cluster
    tier: operator
    operator: odf-operator
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/dbirenfe/argocd-hierarchy.git
    targetRevision: main
    path: resources/odf-operator
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-storage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
