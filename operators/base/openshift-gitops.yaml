apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openshift-gitops
  namespace: openshift-gitops
  labels:
    hierarchy/tier: operator
    hierarchy/operator: openshift-gitops
spec:
  project: cluster-operators
  source:
    repoURL: https://github.com/dbirenfe/argocd-hierarchy.git
    targetRevision: main
    path: resources/openshift-gitops
  destination:
    server: CLUSTER_SERVER_PLACEHOLDER
    namespace: openshift-gitops-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
