apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhsso-operator
  namespace: openshift-gitops
  labels:
    hierarchy/tier: operator
    hierarchy/operator: rhsso-operator
spec:
  project: cluster-operators
  source:
    repoURL: https://github.com/dbirenfe/argocd-hierarchy.git
    targetRevision: main
    path: resources/rhsso-operator
  destination:
    server: CLUSTER_SERVER_PLACEHOLDER
    namespace: rhsso
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
